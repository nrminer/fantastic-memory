{% extends "base.html" %}
{% block content %}

<h1>Add Player</h1>

<div class="card" style="max-width:480px">
  <form method="POST">
    <div class="form-group">
      <label for="name">Player Name</label>
      <input type="text" id="name" name="name" placeholder="e.g. John" required autofocus>
    </div>
    <div class="form-group">
      <label for="starting_balance">Starting Balance (€)</label>
      <input type="number" id="starting_balance" name="starting_balance" step="0.01" value="0" placeholder="0.00">
    </div>
    <div class="flex" style="margin-top:1.5rem">
      <button type="submit" class="btn btn-gold">Add Player</button>
      <a href="{{ url_for('index') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
