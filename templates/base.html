<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casino Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d0d;
      color: #e8e8e8;
      min-height: 100vh;
    }

    nav {
      background: #111;
      border-bottom: 2px solid #c9a227;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 56px;
    }

    nav .brand {
      font-size: 1.3rem;
      font-weight: 700;
      color: #c9a227;
      text-decoration: none;
      letter-spacing: 0.05em;
    }

    nav a {
      color: #aaa;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    nav a:hover { color: #c9a227; }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    h1 { font-size: 1.8rem; color: #c9a227; margin-bottom: 1.5rem; }
    h2 { font-size: 1.3rem; color: #ddd; margin-bottom: 1rem; }

    .flash-messages { margin-bottom: 1.5rem; }

    .flash {
      padding: 0.75rem 1rem;
      border-radius: 6px;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }

    .flash.success { background: #1a3a1a; border: 1px solid #2d6a2d; color: #7ec87e; }
    .flash.error   { background: #3a1a1a; border: 1px solid #6a2d2d; color: #c87e7e; }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th {
      text-align: left;
      color: #888;
      font-weight: 600;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid #2a2a2a;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    td {
      padding: 0.65rem 0.75rem;
      border-bottom: 1px solid #1f1f1f;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1f1f1f; }

    .profit  { color: #5cba5c; font-weight: 600; }
    .loss    { color: #e05555; font-weight: 600; }
    .neutral { color: #888; }

    .btn {
      display: inline-block;
      padding: 0.5rem 1.1rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }

    .btn-gold   { background: #c9a227; color: #000; }
    .btn-red    { background: #9b2335; color: #fff; }
    .btn-ghost  { background: transparent; border: 1px solid #444; color: #ccc; }
    .btn-sm     { padding: 0.3rem 0.75rem; font-size: 0.8rem; }

    form.inline { display: inline; }

    .form-group { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 0.4rem;
    }

    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 0.6rem 0.9rem;
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e8e8e8;
      font-size: 0.95rem;
    }

    input:focus {
      outline: none;
      border-color: #c9a227;
    }

    select {
      padding: 0.6rem 0.9rem;
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e8e8e8;
      font-size: 0.95rem;
    }

    select:focus { outline: none; border-color: #c9a227; }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat-box {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 1rem 1.2rem;
    }

    .stat-box .label { font-size: 0.75rem; color: #777; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-box .value { font-size: 1.6rem; font-weight: 700; margin-top: 0.25rem; }

    .flex { display: flex; align-items: center; gap: 0.75rem; }
    .flex-between { display: flex; align-items: center; justify-content: space-between; }

    .empty { color: #555; text-align: center; padding: 2rem; }
  </style>
</head>
<body>

<nav>
  <a class="brand" href="{{ url_for('index') }}">♠ Casino Manager</a>
  <a href="{{ url_for('index') }}">Dashboard</a>
  <a href="{{ url_for('add_player') }}">Add Player</a>
</nav>

<div class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-messages">
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

</body>
</html>
